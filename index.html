<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Otash — Product Designer</title>

  <!-- Raleway -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav" id="nav">
  <div class="nav__inner">
    <div class="brand">Otash</div>
    <nav>
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<main>

  <!-- HERO -->
  <section class="hero">
    <h1>I design calm digital products.</h1>
    <p class="subtitle">UI/UX Designer — structured, minimal, product-focused.</p>
    <a href="#work" class="btn">View Work</a>
  </section>

  <!-- FLAGSHIP -->
  <section class="flagship">
    <div class="flagship__image">
      <img src="assets/wallpaper.jpg" alt="Flagship Project">
    </div>
    <div class="flagship__text">
      <h2>AI Wallpaper Engineering</h2>
      <p>Engineered aesthetic through structured visual direction.</p>
    </div>
  </section>

  <!-- PROJECT GRID -->
  <section id="work" class="projects">
    <img src="assets/project1.jpg">
    <img src="assets/project2.jpg">
    <img src="assets/project3.jpg">
    <img src="assets/project4.jpg">
    <img src="assets/project5.jpg">
    <img src="assets/project6.jpg">
    <img src="assets/project7.jpg">
    <img src="assets/project8.jpg">
    <img src="assets/project9.jpg">
  </section>

  <!-- ABOUT -->
  <section id="about" class="about">
    <h2>About</h2>
    <p>I focus on clarity, spacing systems, and calm visual hierarchy.</p>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="contact">
    <h2>Contact</h2>
    <form>
      <input type="text" placeholder="Name">
      <input type="email" placeholder="Email">
      <textarea placeholder="Message"></textarea>
      <button type="submit" class="btn">Send</button>
    </form>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
